<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Spotify Clone</title>
<style>
/* ---- Body & Background ---- */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
    animation: bgAnimation 20s infinite alternate;
    transition: background 0.5s;
}
@keyframes bgAnimation {
    0%{background: linear-gradient(120deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);}
    50%{background: linear-gradient(120deg,#a18cd1,#fbc2eb,#fbc2eb,#a6c0fe);}
    100%{background: linear-gradient(120deg,#ffecd2,#fcb69f,#fcb69f,#ff9a9e);}
}

/* ---- Player Container ---- */
.player {
    background: rgba(0,0,0,0.8);
    padding: 20px;
    border-radius: 15px;
    width: 380px;
    color: #fff;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

/* ---- Song Info ---- */
#song-title {
    font-size: 18px;
    margin: 10px 0;
}
#album-cover {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* ---- Controls ---- */
.controls button {
    font-size: 20px;
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    color: #000;
    transition: 0.2s;
}
.controls button:hover { transform: scale(1.2); }

/* ---- Dropdowns & Volume ---- */
select, input[type=range] {
    width: 100%;
    margin: 8px 0;
    border-radius: 5px;
    padding: 5px;
}

/* ---- Language Buttons ---- */
.language-buttons button {
    margin: 3px;
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}
.language-buttons button:hover { transform: scale(1.1); }

/* ---- Progress Bar ---- */
.progress-container {
    display: flex;
    align-items: center;
    gap: 10px;
}
#progress { flex: 1; }

/* ---- Premium Download ---- */
.download-btn {
    background: #ffcc00;
    color: #000;
    margin-top: 8px;
    padding: 6px 10px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    opacity: 0.5;
}
.download-btn.active { opacity: 1; }

/* ---- Admin Login ---- */
#admin-login {
    margin: 10px 0;
}
#admin-login input {
    width: 70%;
    padding: 5px;
    border-radius: 5px;
    border: none;
}
#admin-login button {
    padding: 5px 8px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="player">
    <h2 id="song-title">Select a Song</h2>
    <img id="album-cover" src="https://pics.craiyon.com/2023-10-19/da0384e86aea48bd99d9996592ab9999.webp" alt="Album Cover">
    <audio id="audio"></audio>

    <div class="controls">
        <button id="prev">⏮️</button>
        <button id="play">▶️</button>
        <button id="next">⏭️</button>
    </div>

    <div class="language-buttons">
        <button data-lang="All">All</button>
        <button data-lang="Punjabi">Punjabi</button>
        <button data-lang="Hindi">Hindi</button>
        <button data-lang="English">English</button>
        <button data-lang="Haryanvi">Haryanvi</button>
        <button data-lang="Premium">Premium</button>
    </div>

    <select id="song-select"></select>

    <div class="progress-container">
        <span id="current-time">0:00</span>
        <input type="range" id="progress" value="0" min="0" max="100">
        <span id="duration">0:00</span>
    </div>

    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">

    <button class="download-btn" id="download-btn">Download Premium</button>

    <div id="admin-login">
        <input type="password" id="admin-password" placeholder="Admin Password">
        <button id="admin-btn">Login</button>
    </div>
</div>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const songTitle = document.getElementById('song-title');
const songSelect = document.getElementById('song-select');
const progress = document.getElementById('progress');
const currentTimeEl = document.getElementById('current-time');
const durationEl = document.getElementById('duration');
const volume = document.getElementById('volume');
const albumCover = document.getElementById('album-cover');
const downloadBtn = document.getElementById('download-btn');
const adminInput = document.getElementById('admin-password');
const adminBtn = document.getElementById('admin-btn');

let isAdmin = false;

// ----- Songs Array -----
let songs = [
    // Punjabi
    {title:"Punjabi 1", src:"music/punjabi1.mp3", lang:"Punjabi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Punjabi 2", src:"music/punjabi2.mp3", lang:"Punjabi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Punjabi 3", src:"music/punjabi3.mp3", lang:"Punjabi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Punjabi 4", src:"music/punjabi4.mp3", lang:"Punjabi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Punjabi 5", src:"music/punjabi5.mp3", lang:"Punjabi", cover:"cover-placeholder.jpg", premium:false},
    // Hindi
    {title:"Hindi 1", src:"music/hindi1.mp3", lang:"Hindi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Hindi 2", src:"music/hindi2.mp3", lang:"Hindi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Hindi 3", src:"music/hindi3.mp3", lang:"Hindi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Hindi 4", src:"music/hindi4.mp3", lang:"Hindi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Hindi 5", src:"music/hindi5.mp3", lang:"Hindi", cover:"cover-placeholder.jpg", premium:false},
    // English
    {title:"English 1", src:"music/english1.mp3", lang:"English", cover:"cover-placeholder.jpg", premium:false},
    {title:"English 2", src:"music/english2.mp3", lang:"English", cover:"cover-placeholder.jpg", premium:false},
    {title:"English 3", src:"music/english3.mp3", lang:"English", cover:"cover-placeholder.jpg", premium:false},
    {title:"English 4", src:"music/english4.mp3", lang:"English", cover:"cover-placeholder.jpg", premium:false},
    {title:"English 5", src:"music/english5.mp3", lang:"English", cover:"cover-placeholder.jpg", premium:false},
    // Haryanvi
    {title:"Haryanvi 1", src:"music/haryanvi1.mp3", lang:"Haryanvi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Haryanvi 2", src:"music/haryanvi2.mp3", lang:"Haryanvi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Haryanvi 3", src:"music/haryanvi3.mp3", lang:"Haryanvi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Haryanvi 4", src:"music/haryanvi4.mp3", lang:"Haryanvi", cover:"cover-placeholder.jpg", premium:false},
    {title:"Haryanvi 5", src:"music/haryanvi5.mp3", lang:"Haryanvi", cover:"cover-placeholder.jpg", premium:false},
    // Premium Download (10 songs)
    {title:"Premium 1", src:"music/premium1.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 2", src:"music/premium2.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 3", src:"music/premium3.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 4", src:"music/premium4.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 5", src:"music/premium5.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 6", src:"music/premium6.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 7", src:"music/premium7.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 8", src:"music/premium8.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 9", src:"music/premium9.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
    {title:"Premium 10", src:"music/premium10.mp3", lang:"Premium", cover:"cover-placeholder.jpg", premium:true},
];

let currentSong = 0;

// ----- Functions -----
function loadSong(index){
    audio.src = songs[index].src;
    songTitle.textContent = songs[index].title;
    albumCover.src = songs[index].cover;
    // enable download if admin and premium
    if(songs[index].premium && isAdmin) downloadBtn.classList.add('active');
    else downloadBtn.classList.remove('active');
}

function togglePlay(){
    if(audio.paused){
        audio.play();
        playBtn.textContent = '⏸️';
    } else {
        audio.pause();
        playBtn.textContent = '▶️';
    }
}

function nextSong(){
    currentSong = (currentSong + 1) % songs.length;
    loadSong(currentSong);
    audio.play();
    playBtn.textContent = '⏸️';
}

function prevSong(){
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    loadSong(currentSong);
    audio.play();
    playBtn.textContent = '⏸️';
}

audio.addEventListener('timeupdate', () => {
    if(audio.duration){
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.value = percent;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationEl.textContent = formatTime(audio.duration);
    }
});

progress.addEventListener('input', () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

function formatTime(time){
    const minutes = Math.floor(time/60);
    const seconds = Math.floor(time%60).toString().padStart(2,'0');
    return `${minutes}:${seconds}`;
}

volume.addEventListener('input', ()=>{ audio.volume = volume.value; });

audio.addEventListener('ended', nextSong);

downloadBtn.addEventListener('click', ()=>{
    if(isAdmin && songs[currentSong].premium){
        alert(`Downloading ${songs[currentSong].title}...`);
        // Simulate download, in real app would link or API
    } else alert('Admin login required to download premium songs.');
});

// ----- Admin Login -----
adminBtn.addEventListener('click', ()=>{
    const pass = adminInput.value;
    if(pass === 'VANSH123'){  // simple prototype password
        isAdmin = true;
        alert('Admin login successful!');
        loadSong(currentSong); // refresh download button
    } else {
        alert('Wrong password!');
    }
});

// ----- Language Filter -----
const languageButtons = document.querySelectorAll('.language-buttons button');
languageButtons.forEach(btn=>{
    btn.addEventListener('click', ()=>{
        const lang = btn.dataset.lang;
        songSelect.innerHTML = '';
        let filtered = lang==='All'?songs:songs.filter(s=>s.lang===lang);
        let groups = {};
        filtered.forEach(s=>{
            if(!groups[s.lang]) groups[s.lang]=[];
            groups[s.lang].push(s);
        });
        for(const [groupName, groupSongs] of Object.entries(groups)){
            const optgroup = document.createElement('optgroup');
            optgroup.label = groupName;
            groupSongs.forEach(s=>{
                const opt = document.createElement('option');
                opt.value = s.src;
                opt.textContent = s.title;
                opt.dataset.lang = s.lang;
                optgroup.appendChild(opt);
            });
            songSelect.appendChild(optgroup);
        }
        currentSong=0;
        loadSong(currentSong);
    });
});

// ----- Dropdown Song Selection -----
songSelect.addEventListener('change', ()=>{
    const options = Array.from(songSelect.options);
    currentSong = songs.findIndex(s => s.src === options[songSelect.selectedIndex].value);
    loadSong(currentSong);
    audio.play();
    playBtn.textContent='⏸️';
});

// ----- Event Listeners -----
playBtn.addEventListener('click', togglePlay);
nextBtn.addEventListener('click', nextSong);
prevBtn.addEventListener('click', prevSong);

// ----- Initialize -----
loadSong(currentSong);
audio.volume = volume.value;

</script>
</body>
</html>
