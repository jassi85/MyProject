<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Bridal Boutique - 50 Dresses Demo</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
background:linear-gradient(to bottom,#fff0f5,#ffe4ec);
}

header{
padding:20px;
text-align:center;
background:#f8f0f0;
color:#b359a0;
}

h1,h2,h3,h4{margin:5px;}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.product-card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-card img{
width:100%;
height:350px;
object-fit:cover;
border-radius:12px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
background:linear-gradient(45deg,#b359a0,#ff4da6);
color:#fff;
cursor:pointer;
}

button:hover{opacity:0.9;}

select{
width:48%;
padding:5px;
margin:5px 1% 0 0;
}

#cart{
background:#f0e6f0;
padding:20px;
}

.cart-item{margin:5px 0;}

.out-of-stock{
color:red;
font-weight:bold;
margin-top:5px;
}

input[type="email"]{
width:100%;
padding:8px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

label{display:block;margin-top:10px;}
</style>
</head>

<body>

<header>
<h1>Elegant Bridal Boutique</h1>
<h4>50 Dresses Demo with Inventory & Notifications</h4>
</header>

<section id="dresses">
<h2>Our Collection</h2>
<div class="product-grid" id="product-grid"></div>
</section>

<section id="cart">

<h2>Your Cart</h2>

<label>Customer Email:</label>
<input type="email" id="customer-email" placeholder="Enter your email">

<label>Payment Type:</label>
<select id="payment-type">
<option value="online">Online Payment</option>
<option value="cod">Cash on Delivery (COD)</option>
</select>

<ul id="cart-items"></ul>

<h3>Total: ₹<span id="cart-total">0</span></h3>

<button id="confirm-btn">✅ Confirm Order</button>
</section>

</section>
</section>

<section id="contact">

<h2>Contact Us</h2>

<p>Email us for support or bridal consultation</p>

<p>
📧 
<a href="mailto:jassijatwar85@gmail.com">
jassijatwar85@gmail.com
</a>
</p>

</section>

<script>

const dressNames=[
"Royal Maharani Lehenga","Designer Silk Bridal Gown","Premium Embroidered Saree",
"Luxury Reception Gown","Classic Bridal Suit","Elegant Lace Gown","Modern A-line Dress",
"Romantic Tulle Dress","Vintage Tea-Length Dress","Bohemian Off-Shoulder Dress",
"Mermaid Satin Dress","Strapless Ball Gown","Illusion Neckline Dress","High-Low Chiffon Dress",
"Sweetheart Mermaid Dress","Off-Shoulder Lace Gown","Classic Empire Waist Dress",
"Luxury Silk Lehenga","Designer Net Gown","Premium Velvet Dress","Regal Brocade Lehenga",
"Traditional Banarasi Saree","Contemporary Gown","Princess Cut Dress","Floral Embroidered Lehenga",
"Royal Velvet Gown","Elegant Chiffon Dress","Designer Mermaid Dress","Classic Ball Gown",
"Romantic Lace Dress","Vintage Silk Gown","Bohemian Tulle Lehenga","Luxury Satin Gown",
"Classic Off-Shoulder Dress","High-Low Organza Dress","Sweetheart A-line Dress",
"Mermaid Lace Gown","Illusion Back Dress","Vintage Tea Dress","Royal Embroidered Gown",
"Designer Lehenga Choli","Elegant Net Dress","Premium Silk Saree","Luxury Brocade Gown",
"Classic Empire Dress","Modern A-line Gown","Romantic Tulle Gown","Vintage Velvet Dress",
"Bohemian Chiffon Dress","Strapless Ball Gown II"
];

const products=dressNames.map((name,i)=>{

const price=Math.floor(Math.random()*150000)+100000;
const stock=Math.floor(Math.random()*5)+2;

const images = [
"dress1.jpg",
"dress2.jpg",
"dress3.jpg",
"dress4.jpg",
"dress5.jpg",
"dress6.jpg",
"dress7.jpg",
"dress8.jpg",
"dress9.jpg",
"dress10.jpg",
"dress11.jpg",
"dress12.jpg",
"dress13.jpg",
"dress14.jpg",
"dress15.jpg",
"dress16.jpg",
"dress17.jpg",
"dress18.jpg",
"dress19.jpg",
"dress20.jpg",
"dress21.jpg",
"dress22.jpg",
"dress23.jpg",
"dress24.jpg",
"dress25.jpg",
"dress26.jpg",
"dress27.jpg",
"dress28.jpg",
"dress29.jpg",
"dress30.jpg",
"dress31.jpg",
"dress32.jpg",
"dress33.jpg",
"dress34.jpg",
"dress35.jpg",
"dress36.jpg",
"dress37.jpg",
"dress38.jpg",
"dress39.jpg",
"dress40.jpg",
"dress41.jpg",
"dress42.jpg",
"dress43.jpg",
"dress44.jpg",
"dress45.jpg",
"dress46.jpg",
"dress47.jpg",
"dress48.jpg",
"dress49.jpg",
"dress50.jpg"
];

const img = images[i % images.length];

return{
id:i,
name,
price,
stock,
sizes:["S","M","L"],
colors:["Red","Maroon","Gold","Pink","White"],
img
}

});

let cart=[];
let total=0;

function formatINR(amount){
return amount.toLocaleString('en-IN');
}

const grid=document.getElementById('product-grid');

products.forEach(p=>{

const card=document.createElement('div');
card.className="product-card";

card.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${formatINR(p.price)}</p>
<p>Stock: <span id="stock-${p.id}">${p.stock}</span></p>

<select class="size">
<option>S</option>
<option>M</option>
<option>L</option>
</select>

<select class="color">
<option>Red</option>
<option>Maroon</option>
<option>Gold</option>
<option>Pink</option>
<option>White</option>
</select>

<button>Add to Cart</button>
<div class="out-of-stock" id="oos-${p.id}"></div>
`;

card.querySelector("button").addEventListener("click",()=>addToCart(p.id));

grid.appendChild(card);

});

function addToCart(id){

const p=products.find(prod=>prod.id===id);

if(p.stock<=0){
document.getElementById(`oos-${id}`).textContent="Out of Stock!";
return;
}

const card=grid.children[id];
const size=card.querySelector(".size").value;
const color=card.querySelector(".color").value;

cart.push({...p,size,color});

total+=p.price;

p.stock--;

document.getElementById(`stock-${id}`).textContent=p.stock;

renderCart();

}

function renderCart(){

const list=document.getElementById("cart-items");
list.innerHTML="";

cart.forEach((c,index)=>{

const li=document.createElement("li");
li.className="cart-item";

li.textContent=`${c.name} (${c.size}, ${c.color}) - ₹${formatINR(c.price)} `;

const btn=document.createElement("button");
btn.textContent="Remove";

btn.onclick=()=>{

total-=c.price;

const prod=products.find(p=>p.id===c.id);
prod.stock++;

document.getElementById(`stock-${prod.id}`).textContent=prod.stock;

cart.splice(index,1);

renderCart();

};

li.appendChild(btn);

list.appendChild(li);

});

document.getElementById("cart-total").textContent=formatINR(total);

}

document.getElementById("confirm-btn").addEventListener("click",()=>{

const email=document.getElementById("customer-email").value;

if(cart.length===0){
alert("Cart is empty");
return;
}

if(!email){
alert("Please enter email");
return;
}

alert("🎉 Order Confirmed Successfully!");

generatePDF(email);

cart=[];
total=0;
renderCart();

});

function generatePDF(email){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.setFontSize(18);
doc.text("Elegant Bridal Boutique",20,20);

doc.setFontSize(12);
doc.text("Customer Email: "+email,20,35);

let y=50;

cart.forEach(item=>{

doc.text(`${item.name} (${item.size}, ${item.color}) - ₹${formatINR(item.price)}`,20,y);

y+=10;

});

doc.text("Total: ₹"+formatINR(total),20,y+10);

doc.save("OrderConfirmation.pdf");

}


</script>

</body>
</html>
